name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: svelte-check
        run: bun run check

  lint:
    name: biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: biome ci
        run: bunx biome ci .

  test:
    name: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # WYSIWYG tests + Storybook tests both run in Chromium via Playwright.
      # --with-deps pulls libnss3/libatk-bridge/etc. that ubuntu-latest lacks.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: vitest --run
        run: bun run test

  build:
    name: package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: svelte-package + publint
        run: bun run build
